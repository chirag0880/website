<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeOps | SOC Threat Simulation</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            overflow: hidden;
            background-color: var(--bg-main) !important;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            cursor: crosshair;
        }

        /* Matrix / Radar Background */
        .radar-bg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw; height: 150vw;
            border-radius: 50%;
            border: 1px solid rgba(39, 201, 63, 0.1);
            z-index: 0;
            box-shadow: inset 0 0 100px rgba(39, 201, 63, 0.05);
        }
        
        .radar-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed rgba(39, 201, 63, 0.2);
        }

        .radar-scan {
            position: absolute;
            top: 50%; left: 50%;
            width: 50vw; height: 50vw;
            background: conic-gradient(rgba(39, 201, 63, 0) 0%, rgba(39, 201, 63, 0.2) 20%, rgba(39, 201, 63, 0) 25%);
            transform-origin: 0 0;
            animation: radar-spin 4s linear infinite;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes radar-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Top Nav */
        .sim-nav {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(39, 201, 63, 0.2);
            background: var(--bg-offset);
            opacity: 0.9;
            backdrop-filter: blur(10px);
        }

        .sim-title {
            font-family: 'JetBrains Mono', monospace;
            color: #27c93f;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(39, 201, 63, 0.5);
        }

        .pulse-dot-red {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff5f56;
            box-shadow: 0 0 10px #ff5f56;
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 0.4; } 50% { opacity: 1; box-shadow: 0 0 20px #ff5f56; } 100% { opacity: 0.4; }
        }

        /* Core Network Node */
        #core-node {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            background: rgba(39, 201, 63, 0.1);
            border: 2px solid #27c93f;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(39, 201, 63, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        
        #core-node i { font-size: 2.5rem; color: #27c93f; text-shadow: 0 0 10px #27c93f; }
        .shield-ring {
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border: 2px solid rgba(39, 201, 63, 0.4);
            border-radius: 50%;
            animation: shield-pulse 2s infinite;
        }

        @keyframes shield-pulse {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Threat Particles */
        .threat {
            position: absolute;
            width: 6px; height: 6px;
            background: #ff5f56;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff5f56, 0 0 20px #ff5f56;
            z-index: 40;
        }

        .threat-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 95, 86, 0.8), transparent);
            transform-origin: 0 50%;
            z-index: 39;
        }

        .defense-flash {
            position: absolute;
            width: 30px; height: 30px;
            background: radial-gradient(circle, rgba(39, 201, 63, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 55;
            pointer-events: none;
        }

        /* Side Terminals */
        .soc-panel {
            position: absolute;
            top: 100px; bottom: 30px;
            width: 350px;
            background: var(--bg-main);
            border: 1px solid rgba(39, 201, 63, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            padding: 1rem;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        #panel-left { left: 30px; }
        #panel-right { right: 30px; }

        .panel-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            color: #27c93f;
            border-bottom: 1px solid rgba(39, 201, 63, 0.3);
            padding-bottom: 8px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-list {
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            display: flex; flex-direction: column; gap: 6px;
        }

        .log-list::-webkit-scrollbar { width: 4px; }
        .log-list::-webkit-scrollbar-track { background: transparent; }
        .log-list::-webkit-scrollbar-thumb { background: #27c93f; }

        .log-entry { color: #8892b0; }
        .log-entry span.time { color: #6a8759; }
        .log-entry span.ip { color: #0ea5e9; }
        .log-entry span.atk { color: #ff5f56; }
        .log-entry span.def { color: #27c93f; }

        /* Status metrics */
        .status-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem;
        }
        .status-box {
            background: rgba(255, 95, 86, 0.05);
            border: 1px solid rgba(255, 95, 86, 0.2);
            padding: 10px; text-align: center; border-radius: 4px;
        }
        .status-box.safe {
            background: rgba(39, 201, 63, 0.05);
            border-color: rgba(39, 201, 63, 0.2);
        }
        .st-val { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; color: #ff5f56; }
        .status-box.safe .st-val { color: #27c93f; }
        .st-lbl { font-size: 0.6rem; color: #8892b0; text-transform: uppercase; margin-top: 5px; }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 100;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 4px; border: none; font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer; text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-attack {
            background: transparent; border: 1px solid #ff5f56; color: #ff5f56;
        }
        .btn-attack:hover { background: rgba(255, 95, 86, 0.2); box-shadow: 0 0 20px #ff5f56; }
        
        .btn-defense {
            background: #27c93f; color: #000;
        }
        .btn-defense:hover { box-shadow: 0 0 30px #27c93f; background: #34d84c; }

    </style>
</head>
<body>

    <!-- Apply Theme from localStorage -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
    
    <div class="radar-bg"></div>
    <div class="radar-ring" style="width: 40vw; height: 40vw;"></div>
    <div class="radar-ring" style="width: 80vw; height: 80vw;"></div>
    <div class="radar-scan"></div>

    <nav class="sim-nav">
        <a href="projects.html" class="btn-outline" style="text-decoration:none; color:var(--text-main); border:1px solid rgba(39,201,63,0.3); padding: 0.6rem 1.2rem; border-radius:4px; font-size: 0.8rem; font-family:'JetBrains Mono';">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Disconnect
        </a>
        <div class="sim-title">
            <div class="pulse-dot-red"></div>
            <span>SOC_GLOBAL_THREAT_MAP // LIVE</span>
        </div>
        <div style="width: 100px;"></div>
    </nav>

    <!-- Visual Area -->
    <div id="core-node">
        <i class="fas fa-server"></i>
        <div class="shield-ring"></div>
    </div>

    <!-- Left Panel: Threat Intelligence -->
    <div class="soc-panel" id="panel-left">
        <div class="panel-title"><i class="fas fa-globe"></i> Threat Intelligence Stream</div>
        <div class="status-grid">
            <div class="status-box">
                <div class="st-val" id="val-threats">0</div>
                <div class="st-lbl">Active Threats</div>
            </div>
            <div class="status-box">
                <div class="st-val" id="val-blocked">0</div>
                <div class="st-lbl">Attacks Blocked</div>
            </div>
        </div>
        <div class="log-list" id="threat-logs">
            <div class="log-entry"><span class="time">[INIT]</span> Threat intelligence network connected. Monitoring ingress traffic...</div>
        </div>
    </div>

    <!-- Right Panel: Defense Systems -->
    <div class="soc-panel" id="panel-right">
        <div class="panel-title"><i class="fas fa-shield-halved"></i> Automated Defense Array (XDR)</div>
        <div class="status-grid">
            <div class="status-box safe">
                <div class="st-val">99%</div>
                <div class="st-lbl">Network Integrity</div>
            </div>
            <div class="status-box safe">
                <div class="st-val">ONLINE</div>
                <div class="st-lbl">WAF Status</div>
            </div>
        </div>
        <div class="log-list" id="defense-logs">
            <div class="log-entry"><span class="time">[SIEM]</span> AI Behavioral analysis engine active.</div>
        </div>
    </div>

    <!-- Interactions -->
    <div class="controls">
        <button class="btn btn-attack" onclick="triggerDDoS()"><i class="fas fa-satellite-dish"></i> Simulate DDoS Attack</button>
        <button class="btn btn-defense" onclick="triggerZeroTrust()"><i class="fas fa-lock"></i> Enforce Zero Trust</button>
    </div>

    <script>
        const threatLogs = document.getElementById('threat-logs');
        const defenseLogs = document.getElementById('defense-logs');
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const coreRadius = 70; // intercept distance

        let activeThreats = 0;
        let blockedAttacks = 0;
        let isZeroTrust = false;

        function updateMetrics() {
            document.getElementById('val-threats').innerText = activeThreats;
            document.getElementById('val-blocked').innerText = blockedAttacks;
        }

        function appendLog(panel, msg) {
            const time = new Date().toISOString().substring(11, 23);
            const line = document.createElement('div');
            line.className = 'log-entry';
            line.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            panel.appendChild(line);
            panel.scrollTop = panel.scrollHeight;
        }

        function getRandomIP() {
            return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        }

        function spawnThreat(isBatch = false) {
            activeThreats++;
            updateMetrics();

            // Random edge position
            let startX, startY;
            const edge = Math.floor(Math.random() * 4);
            if(edge === 0) { startX = Math.random() * window.innerWidth; startY = -50; }
            else if(edge === 1) { startX = window.innerWidth + 50; startY = Math.random() * window.innerHeight; }
            else if(edge === 2) { startX = Math.random() * window.innerWidth; startY = window.innerHeight + 50; }
            else { startX = -50; startY = Math.random() * window.innerHeight; }

            const ip = getRandomIP();
            const atkTypes = ["SQLi Payload", "XSS Attempt", "Brute Force", "Malware Sig matching CVE-2023-X"];
            const attackType = atkTypes[Math.floor(Math.random() * atkTypes.length)];

            if(!isBatch) {
                appendLog(threatLogs, `<span class="atk">DETECTED</span> Inbound connection from <span class="ip">${ip}</span>`);
            }

            // Create Visuals
            const threat = document.createElement('div');
            threat.className = 'threat';
            document.body.appendChild(threat);
            gsap.set(threat, { x: startX, y: startY });

            // Calculate trajectory
            const dx = cx - startX;
            const dy = cy - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const duration = 2 + Math.random() * 3;

            // Stop point (shield barrier)
            const stopRatio = (dist - coreRadius) / dist;
            const targetX = startX + dx * stopRatio;
            const targetY = startY + dy * stopRatio;

            // Draw laser line briefly
            const line = document.createElement('div');
            line.className = 'threat-line';
            line.style.width = dist + 'px';
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            document.body.appendChild(line);
            gsap.set(line, { x: startX, y: startY, rotation: angle, opacity: 0 });

            if(Math.random() > 0.5) {
                gsap.to(line, { opacity: 0.5, duration: 0.1, yoyo: true, repeat: 1, onComplete: () => line.remove() });
            } else {
                line.remove();
            }

            // Move particle
            gsap.to(threat, {
                x: targetX, y: targetY, duration: duration, ease: "none",
                onComplete: () => {
                    // Blocked!
                    createDefenseFlash(targetX, targetY);
                    threat.remove();
                    
                    activeThreats--;
                    blockedAttacks++;
                    updateMetrics();
                    
                    if(!isBatch) {
                        appendLog(defenseLogs, `<span class="def">BLOCKED</span> WAF ruleset engaged against <span class="atk">${attackType}</span> from <span class="ip">${ip}</span>`);
                    }
                }
            });
        }

        function createDefenseFlash(x, y) {
            const flash = document.createElement('div');
            flash.className = 'defense-flash';
            document.body.appendChild(flash);
            gsap.set(flash, { x: x, y: y, scale: 0.5, opacity: 1 });
            gsap.to(flash, { scale: 2, opacity: 0, duration: 0.5, onComplete: () => flash.remove() });
        }

        function triggerDDoS() {
            appendLog(threatLogs, `<span class="atk" style="font-weight:bold;">CRITICAL: MASSIVE DDOS ATTEMPT DETECTED!</span> Volumetric attack scaling up...`);
            let count = 0;
            const interval = setInterval(() => {
                spawnThreat(true);
                count++;
                if(count > 60) clearInterval(interval);
            }, 50);

            setTimeout(() => {
                appendLog(defenseLogs, `<span class="def">AUTO-MITIGATION</span> BGP Null routing engaged. Scrubbing center active. Filtering 40Gbps malicious traffic.`);
            }, 1000);
        }

        function triggerZeroTrust() {
            if(isZeroTrust) return;
            isZeroTrust = true;
            appendLog(defenseLogs, `<span class="def" style="font-weight:bold;">ZERO TRUST PROTOCOL INITIATED</span>`);
            appendLog(defenseLogs, `Enforcing strict identity verification on all intra-node traffic.`);
            
            const core = document.getElementById('core-node');
            gsap.to(core, { boxShadow: '0 0 80px #27c93f', borderColor: '#fff', duration: 1 });
            
            setTimeout(() => {
                isZeroTrust = false;
                gsap.to(core, { boxShadow: '0 0 30px rgba(39, 201, 63, 0.5)', borderColor: '#27c93f', duration: 1 });
            }, 5000);
        }

        // Ambient traffic loop
        setInterval(() => {
            if(Math.random() > 0.4) spawnThreat();
        }, 1500);

    </script>
</body>
</html>
