<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeOps | CI/CD Pipeline Simulation</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            overflow: hidden;
            background-color: var(--bg-main) !important;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        /* Matrix Grid Background */
        .cluster-bg {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: 0;
        }

        .cluster-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 20%, var(--bg-main) 90%);
        }

        .sim-nav {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            background: var(--bg-offset);
            opacity: 0.9;
            backdrop-filter: blur(10px);
        }

        .sim-title {
            font-family: 'JetBrains Mono', monospace;
            color: #0ea5e9;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #0ea5e9;
            box-shadow: 0 0 10px #0ea5e9;
            animation: pulse-op 1.5s infinite;
        }

        @keyframes pulse-op {
            0% { opacity: 0.4; } 50% { opacity: 1; box-shadow: 0 0 15px #0ea5e9; } 100% { opacity: 0.4; }
        }

        /* Viewport */
        #sim-viewport {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Pipeline Visuals */
        .pipeline-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 80%;
            max-width: 1200px;
            position: relative;
            padding: 2rem;
            background: var(--bg-offset);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .pipe-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 2;
            width: 120px;
        }

        .stage-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #8892b0;
            transition: all 0.3s ease;
            position: relative;
        }

        .stage-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .stage-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Active/Success/Fail States */
        .pipe-stage.running .stage-icon {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            animation: spin-pulse 2s linear infinite;
        }
        .pipe-stage.running .stage-label { color: var(--text-main); }
        .pipe-stage.running .stage-status { opacity: 1; background: var(--primary-glow); color: var(--primary); }

        .pipe-stage.success .stage-icon {
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 20px rgba(39, 201, 63, 0.2);
        }
        .pipe-stage.success .stage-status { opacity: 1; background: rgba(39, 201, 63, 0.2); color: var(--success); }

        .pipe-stage.fail .stage-icon {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 20px rgba(255, 95, 86, 0.4), inset 0 0 20px rgba(255, 95, 86, 0.2);
            animation: shake 0.5s;
        }
        .pipe-stage.fail .stage-label { color: var(--danger); }
        .pipe-stage.fail .stage-status { opacity: 1; background: rgba(255, 95, 86, 0.2); color: var(--danger); }

        @keyframes spin-pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(14, 165, 233, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Connectors */
        .connector {
            flex-grow: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            margin: 0 10px;
            transform: translateY(-20px); /* Align with icons */
            overflow: hidden;
        }

        .connector-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #0ea5e9;
            box-shadow: 0 0 10px #0ea5e9;
        }

        .data-packet {
            position: absolute;
            top: -4px; left: 0;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px #0ea5e9;
            opacity: 0;
        }

        /* Actions */
        .controls {
            margin-top: 4rem;
            display: flex;
            gap: 1.5rem;
            z-index: 20;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-trigger {
            background: #326ce5;
            color: #fff;
            box-shadow: 0 0 20px rgba(50, 108, 229, 0.4);
        }
        .btn-trigger:hover { background: #0ea5e9; box-shadow: 0 0 30px rgba(14, 165, 233, 0.6); transform: translateY(-2px); }
        
        .btn-fail {
            background: rgba(255, 95, 86, 0.1);
            color: #ff5f56;
            border: 1px solid #ff5f56;
        }
        .btn-fail:hover { background: #ff5f56; color: #fff; box-shadow: 0 0 20px rgba(255, 95, 86, 0.5); transform: translateY(-2px); }

        /* Terminal Overlay */
        .terminal-panel {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 80%; max-width: 1200px;
            height: 250px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            overflow-y: auto;
            backdrop-filter: blur(10px);
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .log-line { margin-bottom: 5px; }
        .log-line span.time { color: var(--success); margin-right: 10px; }
        .log-line span.info { color: #5bc0be; }
        .log-line span.warn { color: var(--warning); }
        .log-line span.error { color: var(--danger); }
        .log-line span.success { color: var(--success); }

        .terminal-panel::-webkit-scrollbar { width: 6px; }
        .terminal-panel::-webkit-scrollbar-track { background: transparent; }
        .terminal-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    </style>
</head>
<body>

    <!-- Apply Theme from localStorage -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>

    <div class="cluster-bg"></div>

    <nav class="sim-nav">
        <a href="projects.html" class="btn-outline" style="text-decoration:none; color:var(--text-main); border:1px solid var(--border); padding: 0.6rem 1.2rem; border-radius:4px; font-size: 0.8rem; font-family:'JetBrains Mono';">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Exit CI/CD
        </a>
        <div class="sim-title">
            <div class="pulse-dot"></div>
            <span>PIPELINE: global-ecommerce | BRANCH: main</span>
        </div>
        <div style="width: 100px;"></div> <!-- Spacer -->
    </nav>

    <div id="sim-viewport">
        
        <div class="pipeline-container">
            <!-- Stage 1 -->
            <div class="pipe-stage" id="stage-source">
                <div class="stage-icon"><i class="fab fa-git-alt"></i></div>
                <div class="stage-label">Source</div>
                <div class="stage-status">READY</div>
            </div>
            
            <div class="connector"><div class="connector-fill" id="fill-1"></div><div class="data-packet" id="pkt-1"></div></div>

            <!-- Stage 2 -->
            <div class="pipe-stage" id="stage-build">
                <div class="stage-icon"><i class="fas fa-box-open"></i></div>
                <div class="stage-label">Build</div>
                <div class="stage-status">WAITING</div>
            </div>

            <div class="connector"><div class="connector-fill" id="fill-2"></div><div class="data-packet" id="pkt-2"></div></div>

            <!-- Stage 3 -->
            <div class="pipe-stage" id="stage-test">
                <div class="stage-icon"><i class="fas fa-vial"></i></div>
                <div class="stage-label">Test</div>
                <div class="stage-status">WAITING</div>
            </div>

            <div class="connector"><div class="connector-fill" id="fill-3"></div><div class="data-packet" id="pkt-3"></div></div>

            <!-- Stage 4 -->
            <div class="pipe-stage" id="stage-security">
                <div class="stage-icon"><i class="fas fa-shield-halved"></i></div>
                <div class="stage-label">Sec Scan</div>
                <div class="stage-status">WAITING</div>
            </div>

            <div class="connector"><div class="connector-fill" id="fill-4"></div><div class="data-packet" id="pkt-4"></div></div>

            <!-- Stage 5 -->
            <div class="pipe-stage" id="stage-deploy">
                <div class="stage-icon"><i class="fas fa-rocket"></i></div>
                <div class="stage-label">Deploy</div>
                <div class="stage-status">WAITING</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-trigger" onclick="runPipeline()"><i class="fas fa-play"></i> Trigger Pipeline</button>
            <button class="btn btn-fail" onclick="forceFailure()"><i class="fas fa-skull"></i> Inject Test Failure</button>
        </div>

    </div>

    <div class="terminal-panel" id="terminal">
        <div class="log-line"><span class="time">[SYSTEM]</span> ArgoCD GitOps engine initialized. Waiting for webhook...</div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        let shouldFail = false;
        let isRunning = false;

        function forceFailure() {
            shouldFail = true;
            appendLog('warn', 'Fault injected into Test stage environment.');
        }

        function appendLog(type, msg) {
            const time = new Date().toISOString().substring(11, 23);
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="time">[${time}]</span> <span class="${type}">[${type.toUpperCase()}]</span> ${msg}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setStageState(stageId, state, statusText) {
            const el = document.getElementById(stageId);
            el.className = `pipe-stage ${state}`;
            el.querySelector('.stage-status').innerText = statusText;
        }

        function animateConnector(fillId, pktId, duration) {
            return new Promise(resolve => {
                const fill = document.getElementById(fillId);
                const pkt = document.getElementById(pktId);
                
                gsap.to(pkt, {opacity: 1, duration: 0.2});
                gsap.to(pkt, {left: '100%', duration: duration, ease: "none"});
                gsap.to(fill, {width: '100%', duration: duration, ease: "none", onComplete: () => {
                    gsap.to(pkt, {opacity: 0, duration: 0.2});
                    resolve();
                }});
            });
        }

        function resetPipeline() {
            document.querySelectorAll('.pipe-stage').forEach(el => {
                el.className = 'pipe-stage';
                el.querySelector('.stage-status').innerText = 'WAITING';
            });
            document.getElementById('stage-source').querySelector('.stage-status').innerText = 'READY';
            
            document.querySelectorAll('.connector-fill').forEach(el => el.style.width = '0%');
            document.querySelectorAll('.data-packet').forEach(el => el.style.left = '0%');
            
            terminal.innerHTML = '<div class="log-line"><span class="time">[SYSTEM]</span> Starting new pipeline execution...</div>';
            shouldFail = false;
        }

        async function runPipeline() {
            if(isRunning) return;
            isRunning = true;
            resetPipeline();

            // 1. Source
            setStageState('stage-source', 'running', 'CLONING');
            appendLog('info', 'Webhook received. Cloning repository global-ecommerce/main ...');
            await new Promise(r => setTimeout(r, 1500));
            appendLog('success', 'Repository cloned. Commit SHA: a1b2c3d4');
            setStageState('stage-source', 'success', 'DONE');

            await animateConnector('fill-1', 'pkt-1', 1);

            // 2. Build
            setStageState('stage-build', 'running', 'BUILDING');
            appendLog('info', 'Building Docker image ecommerce-cart:v2.1.0 ...');
            await new Promise(r => setTimeout(r, 1000));
            appendLog('info', 'Step 1/5: FROM node:18-alpine');
            await new Promise(r => setTimeout(r, 500));
            appendLog('info', 'Step 4/5: RUN npm ci --only=production');
            await new Promise(r => setTimeout(r, 1500));
            appendLog('success', 'Docker image built and pushed to registry.');
            setStageState('stage-build', 'success', 'DONE');

            await animateConnector('fill-2', 'pkt-2', 1);

            // 3. Test
            setStageState('stage-test', 'running', 'TESTING');
            appendLog('info', 'Running Jest unit tests suite...');
            await new Promise(r => setTimeout(r, 1500));
            
            if(shouldFail) {
                appendLog('error', 'FAIL: src/cart/checkout.test.js - Expected 200 OK, got 500 Internal Server Error.');
                appendLog('error', 'Pipeline aborted due to test suite failure.');
                setStageState('stage-test', 'fail', 'FAILED');
                isRunning = false;
                return;
            }

            appendLog('success', 'Test suite passed: 142 passing, 0 failing.');
            setStageState('stage-test', 'success', 'PASSED');

            await animateConnector('fill-3', 'pkt-3', 1);

            // 4. Security
            setStageState('stage-security', 'running', 'SCANNING');
            appendLog('info', 'Running Trivy vulnerability scanner on image...');
            await new Promise(r => setTimeout(r, 2000));
            appendLog('info', 'No CRITICAL or HIGH vulnerabilities found.');
            setStageState('stage-security', 'success', 'SECURE');

            await animateConnector('fill-4', 'pkt-4', 1);

            // 5. Deploy
            setStageState('stage-deploy', 'running', 'DEPLOYING');
            appendLog('info', 'ArgoCD syncing manifest to us-west-2 cluster...');
            await new Promise(r => setTimeout(r, 1500));
            appendLog('info', 'Rolling update strategy initiated. Pods creating...');
            await new Promise(r => setTimeout(r, 1000));
            appendLog('success', 'Deployment successful. Application is live at 99.999% availability.');
            setStageState('stage-deploy', 'success', 'LIVE');

            isRunning = false;
        }

        // Auto-run pipeline after 2 seconds
        setTimeout(() => {
            appendLog('info', 'Automated CI/CD hook detected. Starting deployment pipeline...');
            runPipeline();
        }, 2000);

    </script>
</body>
</html>
